<nav class="lsidenav" aria-label="Modes">
  <header class="lsidenav__head">
    <img class="lsidenav__mark" src="assets/images/gestaltbi-logo.png" alt="" />
    <div class="lsidenav__brand">
      <h2 class="lsidenav__name">GestaltBI</h2>
      <p class="lsidenav__tagline">la forma all'origine del significato</p>
    </div>
  </header>

  <div class="lsidenav__menutitle eyebrow">{{ 'l-sidenav.menuTitle' | translate }}</div>

  <ol class="lsidenav__modes" *ngIf="modes$ | async as modes">
    <ng-container *ngFor="let link of modes; let i = index">
      <li class="lsidenav__divider" *ngIf="link.type === 'divider'" aria-hidden="true"></li>
      <li
        class="lsidenav__mode"
        *ngIf="link.type === 'button'"
        routerLinkActive="lsidenav__mode--active"
        (click)="goto(link.id)"
        tabindex="0"
        role="link"
      >
        <span class="lsidenav__mode-icon" aria-hidden="true">
          <mat-icon svgIcon="{{ link.icon }}"></mat-icon>
        </span>
        <span class="lsidenav__mode-label">{{ link.label }}</span>
        <span class="lsidenav__mode-arrow" aria-hidden="true">→</span>
      </li>
    </ng-container>
  </ol>

  <div class="lsidenav__back">
    <a class="lsidenav__backlink" [routerLink]="['/intro']">
      <mat-icon>arrow_back</mat-icon>
      <span>{{ 'l-sidenav.back' | translate }}</span>
    </a>
  </div>

  <footer class="lsidenav__foot">
    <div class="lsidenav__contact">
      <a href="https://github.com/GestaltBI" target="_blank" rel="noopener">
        <mat-icon>language</mat-icon>
        github.com/GestaltBI
      </a>
      <a href="mailto:info@gestaltbi.com" target="_blank" rel="noopener">
        <mat-icon>mail</mat-icon>
        info&#64;gestaltbi.com
      </a>
    </div>
  </footer>
</nav>
