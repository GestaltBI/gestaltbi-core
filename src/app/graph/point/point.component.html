<div fxLayout="column" fxLayoutGap="24px">
  <mat-card class="analysis-filter">
    <sbi-filter localFilter="default" localState="default">
      <sbi-periodfilter startFrom="2020-01-01" startTo="2020-12-31"></sbi-periodfilter>
    </sbi-filter>
  </mat-card>
  <div>
    <div echarts [theme]="theme" [merge]="mergeOption" [options]="chartOption"></div>
    <sbi-map-legend
      class="legend-floating legend-graph"
      [isMap]="false"
      tag="uatu:aggregate:point"
      (measureChange)="updateSelectedMeasure($event)"
    ></sbi-map-legend>
    <div echarts [theme]="theme" [merge]="doubleChartMergeOption" [options]="doubleChartOption"></div>
  </div>
</div>
