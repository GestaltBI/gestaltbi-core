<div class="periodfilter">
  <mat-form-field appearance="outline" class="periodfilter__field">
    <mat-label>{{ 'common.startDate' | translate }}</mat-label>
    <input
      [(ngModel)]="data.startDate"
      matInput
      readonly
      [matDatepicker]="startPicker"
      (click)="startPicker.open()"
    />
    <mat-datepicker-toggle matSuffix [for]="startPicker"></mat-datepicker-toggle>
    <mat-datepicker #startPicker></mat-datepicker>
  </mat-form-field>

  <span class="periodfilter__separator" aria-hidden="true">→</span>

  <mat-form-field appearance="outline" class="periodfilter__field">
    <mat-label>{{ 'common.endDate' | translate }}</mat-label>
    <input
      [(ngModel)]="data.endDate"
      matInput
      readonly
      [matDatepicker]="endPicker"
      (click)="endPicker.open()"
    />
    <mat-datepicker-toggle matSuffix [for]="endPicker"></mat-datepicker-toggle>
    <mat-datepicker #endPicker></mat-datepicker>
  </mat-form-field>
</div>
